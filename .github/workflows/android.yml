  name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.5'  # 使用稳定版，避免最新版的兼容性问题

      -- name: Install Android SDK
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          # 1. 创建正确的目标目录 (放在 HOME 下，避免权限问题)
          SDK_DIR="$HOME/cmdline-tools"
          mkdir -p $SDK_DIR

          # 2. 下载 command line tools (使用国内镜像加速，防止下载超时)
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          
          # 3. 解压到刚才创建的目录 (注意：解压出来的文件夹名通常是 latest)
          unzip -q cmdline-tools.zip -d $SDK_DIR
          
          # 4. 重命名文件夹以符合 sdkmanager 的预期 (这一步很重要)
          mv $SDK_DIR/cmdline-tools $SDK_DIR/latest

          # 5. 清理 zip 包节省空间
          rm -f cmdline-tools.zip

          # 6. 设置环境变量
          export PATH=$SDK_DIR/latest/bin:$PATH
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools

          # 7. 接受许可协议并安装必要组件
          mkdir -p ~/.android/
          echo "https://mirrors.cloud.tencent.com/AndroidSDK/repository2-1.xml" > ~/.android/repositories.cfg
          
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: Build with Gradle
        run: ./gradlew clean assembleDebug --info --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
