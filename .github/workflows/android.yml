name: Build Letv S50 Air TVBOX APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 设置 Node.js 18 (如果不需要可以不装，但保留无害)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 2. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. 设置 Gradle (使用官方插件)
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.10' # 使用较新的稳定版

      # 5. 安装 Android SDK (这里改成 33 以适配更多新项目，你可以改回 30)
      - name: Install Android SDK and Build Tools
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          for i in {1..3}; do
            wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip && break
            sleep 5
          done
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm -f cmdline-tools.zip
          
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          mkdir -p ~/.android/
          # 使用腾讯云镜像加速
          echo "https://mirrors.cloud.tencent.com/AndroidSDK/repository2-1.xml" > ~/.android/repositories.cfg
          
          yes | sdkmanager --licenses > /dev/null
          # 安装 API 33 和对应的构建工具 (如果你的项目需要其他版本，请修改这里)
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      # 6. 构建 APK (开启详细日志，先清理再构建)
      - name: Build with Gradle
        run: gradle clean assembleDebug --info --stacktrace --scan

      # 7. 上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Letv-S50-Air-TVBOX
          path: app/build/outputs/apk/debug/app-debug.apk
