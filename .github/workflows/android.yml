name: Build Letv S50 Air TVBOX APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 第一步：设置 Node.js 16 (解决部分 Action 的兼容性问题)
      # 注意：这里先设置 Node.js，因为后续的 actions 可能需要它
      - name: Set Node.js version to 16
        uses: actions/setup-node@v4  # 升级到 v4，兼容 Node.js 24
        with:
          node-version: '16'

      # 第二步：拉取代码 (升级到 v4)
      - name: Checkout code
        uses: actions/checkout@v4  # <-- 关键修复：从 v3 升级到 v4
        # 如果需要子模块，可以取消下一行的注释
        # with:
        #   submodules: true

      # 第三步：设置 JDK 11 (升级到 v4)
      - name: Set up JDK 11
        uses: actions/setup-java@v4  # <-- 关键修复：从 v3 升级到 v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      # 第四步：授权 gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 第五步：安装 Android SDK (手动安装 - 保留旧版逻辑以确保 API 19 可用)
      - name: Install Android SDK and Build Tools (Manual + Retry)
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          # 创建 SDK 目录结构
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          
          # 重试下载命令行工具（最多3次）
          for i in {1..3}; do
            echo "Attempt $i to download commandlinetools..."
            wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip && break
            sleep 5
          done
          
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm -f cmdline-tools.zip
          
          # 设置环境变量
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          
          # 配置国内镜像源（解决下载慢和404问题）
          mkdir -p ~/.android/
          echo "https://mirrors.cloud.tencent.com/AndroidSDK/repository2-1.xml" > ~/.android/repositories.cfg
          
          # 安装乐视 S50 Air 所需的 Android 4.4 (API 19) 环境
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-19" "build-tools;19.1.0" "platform-tools"

      # 第六步：清理旧构建
      - name: Clean previous builds
        run: ./gradlew clean

      # 第七步：构建 APK（带详细日志）
      - name: Build with Gradle (Verbose)
        run: ./gradlew assembleDebug --no-daemon --info --stacktrace

      # 第八步：上传 APK (升级到 v4)
      - name: Upload APK
        uses: actions/upload-artifact@v4  # <-- 确保是 v4
        with:
          name: letv-s50air-tvbox
          path: app/build/outputs/apk/debug/app-debug.apk
