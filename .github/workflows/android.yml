name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 17（必须）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 删除本地 properties，防止干扰 CI
      - name: Remove local.properties
        run: rm -f local.properties

      # 4. 安装 Android SDK（官方命令行工具）
      - name: Install Android SDK
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
        run: |
          CMDTOOLS_DIR=${{ github.workspace }}/android-sdk/cmdline-tools
          mkdir -p $CMDTOOLS_DIR

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $CMDTOOLS_DIR
          mv $CMDTOOLS_DIR/cmdline-tools $CMDTOOLS_DIR/latest
          rm -f cmdline-tools.zip

          export PATH=$CMDTOOLS_DIR/latest/bin:$PATH
          mkdir -p ~/.android
          yes | sdkmanager --licenses > /dev/null

          sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platform-tools"

      # 5. ✅ 关键：绕过 setup-gradle Action，手动准备 wrapper
      - name: Prepare Gradle Wrapper (no validation)
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
        run: |
          # 确保目录存在
          mkdir -p gradle/wrapper

          # 使用官方 master 分支的 wrapper jar（无任何校验逻辑）
          curl -sSLo gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar

          # 确保 gradlew 可执行
          chmod +x gradlew

      # 6. 构建 APK
      - name: Build with Gradle
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
        run: ./gradlew clean assembleDebug --no-daemon

      # 7. 上传 APK（通配，防止文件名不一致）
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Letv-S50Air-APK
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
