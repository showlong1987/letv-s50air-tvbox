name: Build Letv S50 Air TVBOX APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 🔥 关键修复：强制使用 Node.js 20，避开 Node.js 24 的弃用问题
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true  # 允许使用旧的 Node 版本
      # 或者在 job 级别设置：
      # FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true  # 强制使用 Node 20 (如果 runner 支持)

    steps:
      # 第一步：设置 Node.js 18 (稳定版，不触发警告)
      - name: Set Node.js version to 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 第二步：拉取代码 (使用 v4 稳定版，但配合环境变量降级)
      - name: Checkout code
        uses: actions/checkout@v4

      # 第三步：设置 JDK 11 (保持 v4，但配合环境变量)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      # ... 后续步骤保持不变 ...
