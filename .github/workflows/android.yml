name: Build Letv S50 Air TVBOX APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 第一步：设置 Node.js 16 (解决之前的弃用警告)
      - name: Set Node.js version to 16
        uses: actions/setup-node@v4
        with:
            node-version: '16'

      # 第二步：拉取代码
      - name: Checkout code
        uses: actions/checkout@v3  # 降级到 v3 保持兼容

      # 第三步：设置 JDK 11
      - name: Set up JDK 11
        uses: actions/setup-java@v3  # 降级到 v3 保持兼容
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      # 第四步：授权 gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 第五步：安装 Android SDK (手动安装)
      - name: Install Android SDK and Build Tools (Manual + Retry)
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          
          # 重试下载
          for i in {1..3}; do
            echo "Attempt $i to download commandlinetools..."
            wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip && break
            sleep 5
          done
          
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm -f cmdline-tools.zip
          
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          
          # 配置腾讯云镜像
          mkdir -p ~/.android/
          echo "https://mirrors.cloud.tencent.com/AndroidSDK/repository2-1.xml" > ~/.android/repositories.cfg
          
          # 安装 API 19 环境
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-19" "build-tools;19.1.0" "platform-tools"

      # 第六步：清理
      - name: Clean previous builds
        run: ./gradlew clean

      # 第七步：构建 APK
      - name: Build with Gradle (Verbose)
        run: ./gradlew assembleDebug --no-daemon --info --stacktrace

      # 第八步：上传 APK (修复：升级到 v4)
      - name: Upload APK
        uses: actions/upload-artifact@v4  # <--- 关键修改：从 v3 改为 v4
        with:
          name: letv-s50air-tvbox
          path: app/build/outputs/apk/debug/app-debug.apk
