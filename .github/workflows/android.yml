name: Build Letv S50 Air TVBOX APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install Android SDK and Build Tools (Manual)
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          # 创建 SDK 目录结构
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          
          # 下载命令行工具
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm -f cmdline-tools.zip
          
          # 设置环境变量
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          
          # 配置国内镜像源（解决下载慢和404问题）
          mkdir -p ~/.android/
          echo "https://mirrors.cloud.tencent.com/AndroidSDK/repository2-1.xml" > ~/.android/repositories.cfg
          
          # 安装乐视 S50 Air 所需的 Android 4.4 (API 19) 环境
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-19" "build-tools;19.1.0" "platform-tools"

      - name: Build with Gradle
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: letv-s50air-tvbox
          path: app/build/outputs/apk/debug/app-debug.apk
