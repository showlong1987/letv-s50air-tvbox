name: Build Letv S50 Air TVBOX APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 第一步：设置 Node.js 18 (稳定版)
      - name: Set Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 第二步：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 第三步：设置 JDK 11 (修复了缓存报错)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache-dependency-path: '**/*.gradle' # 关键修复：解决 Path Validation Error

      # 第四步：授权 gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 第五步：安装 Android SDK
      - name: Install Android SDK and Build Tools
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          for i in {1..3}; do
            wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip && break
            sleep 5
          done
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm -f cmdline-tools.zip
          
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          mkdir -p ~/.android/
          echo "https://mirrors.cloud.tencent.com/AndroidSDK/repository2-1.xml" > ~/.android/repositories.cfg
          
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-19" "build-tools;19.1.0" "platform-tools"

      # 第六步：清理
      - name: Clean previous builds
        run: ./gradlew clean

      # 第七步：构建 APK
      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon --info

      # 第八步：上传 APK (关键步骤：没有这一步就没法下载)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Letv-S50-Air-TVBOX
          path: app/build/outputs/apk/debug/app-debug.apk
