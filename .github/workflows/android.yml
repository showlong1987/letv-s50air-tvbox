name: Build Letv S50 Air TVBOX APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '16'  # 强制整个 job 使用 Node.js 16
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      # 第一步：设置 Node.js 16（必须在最前面）
      - name: Set Node.js version to 16
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 第二步：检出代码（使用 v3，避免 Node.js 24 问题）
      - name: Checkout code
        uses: actions/checkout@v3  # ← 降级到 v3

      # 第三步：设置 JDK 11（使用 v3，避免 Node.js 24 问题）
      - name: Set up JDK 11
        uses: actions/setup-java@v3  # ← 降级到 v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      # 第四步：赋予 gradlew 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 第五步：安装 Android SDK（手动 + 重试 + 镜像）
      - name: Install Android SDK and Build Tools (Manual + Retry)
        run: |
          # 创建 SDK 目录结构
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          
          # 重试下载命令行工具（最多3次）
          for i in {1..3}; do
            echo "Attempt $i to download commandlinetools..."
            wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip && break
            sleep 5
          done
          
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm -f cmdline-tools.zip
          
          # 设置环境变量
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          
          # 配置国内镜像源（解决下载慢和404问题）
          mkdir -p ~/.android/
          echo "https://mirrors.cloud.tencent.com/AndroidSDK/repository2-1.xml" > ~/.android/repositories.cfg
          
          # 安装乐视 S50 Air 所需的 Android 4.4 (API 19) 环境
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-19" "build-tools;19.1.0" "platform-tools"

      # 第六步：清理旧构建
      - name: Clean previous builds
        run: ./gradlew clean

      # 第七步：构建 APK（带重试和详细日志）
      - name: Build with Gradle (Verbose + Retry)
        run: |
          # 尝试构建，如果失败则重试一次
          ./gradlew assembleDebug --no-daemon --info --stacktrace || (echo "First attempt failed, retrying..." && ./gradlew assembleDebug --no-daemon --refresh-dependencies)

      # 第八步：上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v3  # ← 降级到 v3，避免 Node.js 24 问题
        with:
          name: letv-s50air-tvbox
          path: app/build/outputs/apk/debug/app-debug.apk
