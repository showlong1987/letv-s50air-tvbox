name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.5'

      - name: Install Android SDK
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
        run: |
          SDK_DIR=$HOME/cmdline-tools
          mkdir -p $SDK_DIR

          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $SDK_DIR
          mv $SDK_DIR/cmdline-tools $SDK_DIR/latest
          rm -f cmdline-tools.zip

          export PATH=$SDK_DIR/latest/bin:$PATH

          mkdir -p ~/.android/
          echo "https://mirrors.cloud.tencent.com/AndroidSDK/repository2-1.xml" > ~/.android/repositories.cfg

          yes | sdkmanager --licenses
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: Build with Gradle
        run: ./gradlew clean assembleDebug --info --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
