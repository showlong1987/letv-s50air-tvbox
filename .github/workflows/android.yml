name: Build Android APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ✅ 关键：用 v6，但不要再指定 gradle-version
      # 让 Gradle Wrapper 自己决定版本（你本地是 8.5）
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Remove local.properties
        run: rm -f local.properties

      - name: Install Android SDK
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
        run: |
          CMDTOOLS_DIR=${{ github.workspace }}/android-sdk/cmdline-tools
          mkdir -p $CMDTOOLS_DIR

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $CMDTOOLS_DIR
          mv $CMDTOOLS_DIR/cmdline-tools $CMDTOOLS_DIR/latest
          rm -f cmdline-tools.zip

          export PATH=$CMDTOOLS_DIR/latest/bin:$PATH
          mkdir -p ~/.android
          yes | sdkmanager --licenses > /dev/null

          sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platform-tools"

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
        run: ./gradlew clean assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Letv-S50Air-APK
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
