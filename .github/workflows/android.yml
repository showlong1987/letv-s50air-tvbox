name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
- name: Set up JDK 11
  uses: actions/setup-java@v4
  with:
    java-version: '11'
    distribution: 'temurin'

# 使用官方命令行工具直接安装，跳过 setup-android 插件的封装
- name: Install Android SDK and Build Tools
  run: |
    # 创建 SDK 目录
    mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
    # 下载命令行工具 (版本 11.0 对应 api 30，但对于老项目兼容性好)
    wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O cmdline-tools.zip
    unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools/latest/
    mv $ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/
    rm -rf cmdline-tools.zip
    
    # 添加到环境变量
    export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
    
    # 安装指定的 API 级别和构建工具
    sdkmanager "platforms;android-19" "build-tools;19.1.0" "platform-tools"
    yes | sdkmanager --licenses # 自动接受许可
    - name: Build with Gradle
      run: ./gradlew build
