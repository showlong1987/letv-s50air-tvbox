name: Build Letv S50 Air TVBOX APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 第一步：设置 Node.js 18 (显式指定版本，避免警告)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # <-- 关键：指定版本 18

      # 第二步：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 第三步：设置 JDK 11
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
          # 修正缓存路径：确保 gradlew 文件存在，通常它在根目录
          # 如果报错 Path Validation Error，可以尝试删除 cache-dependency-path 这一行
          # 或者设置为正确的路径，比如 '**/*.gradle' 或 'gradle/wrapper/gradle-wrapper.properties'
          # 这里我们暂时注释掉它，避免报错，因为 gradle 缓存通常由 setup-java 自动处理
          # cache-dependency-path: 'gradle/wrapper/gradle-wrapper.properties' # 可选

      # 第四步：授权 gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 第五步：安装 Android SDK
      - name: Install Android SDK and Build Tools
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          for i in {1..3}; do
            wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip && break
            sleep 5
          done
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm -f cmdline-tools.zip
          
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          mkdir -p ~/.android/
          echo "https://mirrors.cloud.tencent.com/AndroidSDK/repository2-1.xml" > ~/.android/repositories.cfg
          
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-19" "build-tools;19.1.0" "platform-tools"

      # 第六步：清理
      - name: Clean previous builds
        run: ./gradlew clean

      # 第七步：构建 APK
      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon --info

      # 第八步：上传 APK (必须恢复这一步！)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Letv-S50-Air-TVBOX  # 这个名字会显示在 Artifacts 列表中
          path: app/build/outputs/apk/debug/app-debug.apk  # 确保这个路径存在
