name: Build Letv S50 Air TVBOX APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 设置 Node.js 18
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 2. 拉取代码 (重点：使用 sparse-checkout 跳过 gradle/wrapper 目录，避免验证失败)
      - name: Checkout code (without wrapper)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            app
            build.gradle
            settings.gradle
            # 注意：我们不拉取 gradle/wrapper 目录，让 setup-gradle 自己处理
          fetch-depth: 0

      # 3. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. 设置 Gradle (使用官方插件，跳过本地 wrapper 验证)
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.10' # 使用较新的稳定版

      # 5. 安装 Android SDK
      - name: Install Android SDK and Build Tools
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          for i in {1..3}; do
            wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip && break
            sleep 5
          done
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm -f cmdline-tools.zip
          
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          mkdir -p ~/.android/
          echo "https://mirrors.cloud.tencent.com/AndroidSDK/repository2-1.xml" > ~/.android/repositories.cfg
          
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-30" "build-tools;30.0.3" "platform-tools"

      # 6. 构建 APK (直接使用 gradle 命令)
      - name: Build with Gradle
        run: gradle assembleDebug --no-daemon --stacktrace

      # 7. 上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Letv-S50-Air-TVBOX
          path: app/build/outputs/apk/debug/app-debug.apk
