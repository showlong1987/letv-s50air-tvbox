name: Build Letv S50 Air TVBOX APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 设置 Node.js (避开 Node 20 弃用警告，虽然不影响，但看着舒服)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 2. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. 设置 JDK 17 (移除了 cache 参数，避免 Path Validation Error)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # 注意：这里不再写 cache: gradle，避免报错

      # 4. 授权 gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. 安装 Android SDK (保持原样)
      - name: Install Android SDK and Build Tools
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          for i in {1..3}; do
            wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip && break
            sleep 5
          done
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm -f cmdline-tools.zip
          
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          mkdir -p ~/.android/
          echo "https://mirrors.cloud.tencent.com/AndroidSDK/repository2-1.xml" > ~/.android/repositories.cfg
          
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platforms;android-19" "build-tools;19.1.0" "platform-tools"

      # 6. 清理
      - name: Clean previous builds
        run: ./gradlew clean

      # 7. 构建 APK (关键：增加 --stacktrace 以便出错时能看清原因，但这里先不加，保持简洁)
      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon

      # 8. 上传 APK (确保路径正确)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Letv-S50-Air-TVBOX
          # 确保这里是你的 APK 实际路径，通常是 app/build/outputs/apk/debug/app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
