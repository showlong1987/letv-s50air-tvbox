name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '7.5'

      - name: Install Android SDK
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
        run: |
          CMDTOOLS_DIR=${{ github.workspace }}/android-sdk/cmdline-tools
          mkdir -p $CMDTOOLS_DIR

          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $CMDTOOLS_DIR
          mv $CMDTOOLS_DIR/cmdline-tools $CMDTOOLS_DIR/latest
          rm -f cmdline-tools.zip

          export PATH=$CMDTOOLS_DIR/latest/bin:$PATH

          mkdir -p ~/.android/
          yes | sdkmanager --licenses > /dev/null

          sdkmanager \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platform-tools"

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
        run: ./gradlew clean assembleDebug --info --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
