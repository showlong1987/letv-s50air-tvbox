# 乐视S50 Air TVBOX 自动构建工作流
# 使用方法: 将此仓库推送到GitHub后,每次push都会自动构建APK

name: 构建乐视TVBOX APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置Java环境
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: 设置Android SDK
      uses: android-actions/setup-android@v2

    - name: 安装Android Build Tools
      run: |
        sdkmanager "build-tools;28.0.3" "platforms;android-19"

    - name: 赋予gradlew执行权限
      run: chmod +x gradlew

    - name: 构建APK (Release)
      run: ./gradlew assembleRelease

    - name: 上传APK产物
      uses: actions/upload-artifact@v3
      with:
        name: 乐视TVBOX-S50Air-APK
        path: app/build/outputs/apk/release/*.apk

    - name: 创建Release (仅打tag时)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
        body: |
          ## 乐视S50 Air TVBOX 套壳版

          ### 适配信息
          - 设备: 乐视超级电视 S50 Air
          - 系统: LetvUI 3.0 (Android 4.4)
          - CPU: Mstar 6A918 Quad-Core A9 1.5GHz
          - GPU: Mali 450 MP4
          - RAM: 2GB DDR3 / ROM: 16GB eMMC
          - minSdk: API 14 / targetSdk: API 19

          ### 安装方法
          1. 下载APK文件
          2. 开启电视ADB调试: 信号源 → 输入2580 → 其他选项 → ADB调试 → 开启
          3. 通过U盘安装或ADB安装: `adb install -r 乐视TVBOX.apk`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
