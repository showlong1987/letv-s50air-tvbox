<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>乐视TVBOX - S50 Air</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "WenQuanYi Micro Hei", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0D1117 0%, #161B22 50%, #0D1117 100%);
            color: #C9D1D9;
            overflow: hidden;
            width: 1920px;
            height: 1080px;
        }

        /* 顶部导航栏 - 乐视风格 */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 2px solid #30363D;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #E50914, #FF6B6B);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
        }

        .logo-text {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, #E50914, #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            gap: 30px;
        }

        .nav-tab {
            font-size: 22px;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: #8B949E;
        }

        .nav-tab.active {
            color: #FFFFFF;
            background: rgba(229, 9, 20, 0.3);
            border: 1px solid #E50914;
        }

        .nav-tab:hover {
            color: #FFFFFF;
        }

        /* 搜索栏 */
        .search-bar {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 8px 20px;
            border: 1px solid #30363D;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: #C9D1D9;
            font-size: 18px;
            width: 300px;
            outline: none;
        }

        .search-icon {
            font-size: 20px;
            margin-right: 10px;
        }

        /* 主内容区 */
        .main-content {
            padding: 30px 40px;
            height: calc(1080px - 100px);
            overflow-y: auto;
        }

        .section-title {
            font-size: 26px;
            font-weight: bold;
            color: #FFFFFF;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 5px;
            height: 25px;
            background: #E50914;
            border-radius: 3px;
        }

        /* 视频卡片网格 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .video-card {
            background: rgba(22, 27, 34, 0.8);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .video-card:hover, .video-card.focused {
            transform: scale(1.05);
            border-color: #E50914;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
        }

        .video-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .video-info {
            padding: 12px;
        }

        .video-title {
            font-size: 16px;
            color: #FFFFFF;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-meta {
            font-size: 13px;
            color: #8B949E;
        }

        /* 分类标签 */
        .category-tags {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .category-tag {
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(48, 54, 61, 0.5);
            color: #8B949E;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .category-tag.active, .category-tag:hover {
            background: #E50914;
            color: #FFFFFF;
        }

        /* 设置面板 */
        .settings-panel {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 500px;
            height: 100%;
            background: rgba(13, 17, 23, 0.95);
            border-left: 2px solid #30363D;
            padding: 40px 30px;
            z-index: 100;
        }

        .settings-panel h2 {
            color: #FFFFFF;
            font-size: 28px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #E50914;
        }

        .setting-item {
            margin-bottom: 25px;
        }

        .setting-item label {
            display: block;
            font-size: 18px;
            color: #C9D1D9;
            margin-bottom: 8px;
        }

        .setting-item input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            background: rgba(48, 54, 61, 0.5);
            border: 1px solid #30363D;
            border-radius: 8px;
            color: #FFFFFF;
            font-size: 16px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #E50914;
            color: white;
        }

        .btn-primary:hover {
            background: #FF1A25;
        }

        .btn-secondary {
            background: rgba(48, 54, 61, 0.8);
            color: #C9D1D9;
            margin-left: 10px;
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(229, 9, 20, 0.9);
            color: white;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 20px;
            z-index: 200;
            display: none;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(229, 9, 20, 0.3);
            border-top-color: #E50914;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #8B949E;
        }

        .empty-state .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-state p {
            font-size: 20px;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: #30363D;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #484F58;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-bar">
        <div class="logo">
            <div class="logo-icon">L</div>
            <span class="logo-text">乐视TVBOX</span>
        </div>
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchTab('recommend')">推荐</div>
            <div class="nav-tab" onclick="switchTab('movie')">电影</div>
            <div class="nav-tab" onclick="switchTab('tv')">电视剧</div>
            <div class="nav-tab" onclick="switchTab('variety')">综艺</div>
            <div class="nav-tab" onclick="switchTab('anime')">动漫</div>
            <div class="nav-tab" onclick="switchTab('live')">直播</div>
        </div>
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="搜索影视内容..." id="searchInput">
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content" id="mainContent">
        <!-- 分类标签 -->
        <div class="category-tags" id="categoryTags">
            <div class="category-tag active">全部</div>
            <div class="category-tag">动作</div>
            <div class="category-tag">喜剧</div>
            <div class="category-tag">科幻</div>
            <div class="category-tag">爱情</div>
            <div class="category-tag">悬疑</div>
            <div class="category-tag">恐怖</div>
        </div>

        <!-- 推荐内容 -->
        <div id="recommendSection">
            <div class="section-title">🔥 热门推荐</div>
            <div class="video-grid" id="hotGrid"></div>

            <div class="section-title">📺 最新上线</div>
            <div class="video-grid" id="latestGrid"></div>

            <div class="section-title">🎬 高分精选</div>
            <div class="video-grid" id="topGrid"></div>
        </div>

        <!-- 设置面板 -->
        <div class="settings-panel" id="settingsPanel">
            <h2>⚙️ 设置</h2>
            <div class="setting-item">
                <label>接口配置地址</label>
                <input type="text" id="apiUrl" placeholder="请输入TVBOX接口地址">
            </div>
            <div class="setting-item">
                <label>播放器设置</label>
                <input type="text" id="playerType" placeholder="默认/硬解/软解">
            </div>
            <div class="setting-item">
                <label>EPG节目预告地址</label>
                <input type="text" id="epgUrl" placeholder="https://epg.112114.xyz/">
            </div>
            <div>
                <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
            </div>
        </div>
    </div>

    <!-- 提示信息 -->
    <div class="toast" id="toast"></div>

    <script>
        // 乐视S50 Air 配置
        const DEVICE_CONFIG = {
            model: 'Letv S50 Air',
            androidVersion: '4.3',
            resolution: '1920x1080',
            cpu: 'Mstar 6A918 Quad-Core A9 1.5GHz',
            gpu: 'Mali 450 MP4',
            ram: '2GB DDR3',
            rom: '16GB eMMC',
            system: 'LetvUI 3.0'
        };

        // 内置接口源列表
        const DEFAULT_SOURCES = [
            { name: '饭太硬', url: 'http://www.fantaiying.com/tv/' },
            { name: '巧记', url: 'http://cdn.qiaoji8.com/tvbox.json' },
            { name: '肥猫', url: 'http://wobushifengmao.love:63/' },
            { name: '小雅', url: 'http://drpy.site/js1' },
            { name: '多多', url: 'https://yydsys.top/duo' },
            { name: '南风', url: 'https://agit.ai/Yoursmile7/TVBox/raw/branch/master/XC.json' }
        ];

        // 模拟视频数据
        const mockVideos = [
            { title: '流浪地球2', year: '2023', type: '科幻', rating: '9.2', poster: '🚀' },
            { title: '满江红', year: '2023', type: '悬疑', rating: '8.5', poster: '🎭' },
            { title: '深海', year: '2023', type: '动画', rating: '8.8', poster: '🌊' },
            { title: '交换人生', year: '2023', type: '喜剧', rating: '8.3', poster: '🔄' },
            { title: '无名', year: '2023', type: '动作', rating: '8.6', poster: '🕵️' },
            { title: '中国乒乓', year: '2023', type: '运动', rating: '8.4', poster: '🏓' },
            { title: '铃芽之旅', year: '2023', type: '动画', rating: '9.0', poster: '🚪' },
            { title: '毒舌律师', year: '2023', type: '剧情', rating: '8.7', poster: '⚖️' },
            { title: '断网', year: '2023', type: '犯罪', rating: '8.1', poster: '🌐' },
            { title: '风再起时', year: '2023', type: '犯罪', rating: '8.9', poster: '🌬️' },
            { title: '宇宙探索编辑部', year: '2023', type: '科幻', rating: '9.1', poster: '🔭' },
            { title: '保你平安', year: '2023', type: '喜剧', rating: '8.6', poster: '🛡️' }
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderVideoGrid('hotGrid', mockVideos.slice(0, 6));
            renderVideoGrid('latestGrid', mockVideos.slice(2, 8));
            renderVideoGrid('topGrid', mockVideos.slice(4, 10));

            // 搜索功能
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleSearch(this.value);
                }
            });

            // 加载保存的设置
            loadSettings();

            console.log('乐视TVBOX 已启动');
            console.log('设备信息:', DEVICE_CONFIG);
        });

        // 渲染视频网格
        function renderVideoGrid(containerId, videos) {
            const container = document.getElementById(containerId);
            container.innerHTML = videos.map((v, i) => `
                <div class="video-card" onclick="playVideo('${v.title}')" 
                     onmouseenter="this.classList.add('focused')" 
                     onmouseleave="this.classList.remove('focused')">
                    <div class="video-poster">${v.poster}</div>
                    <div class="video-info">
                        <div class="video-title">${v.title}</div>
                        <div class="video-meta">${v.year} · ${v.type} · ⭐${v.rating}</div>
                    </div>
                </div>
            `).join('');
        }

        // 播放视频
        function playVideo(title) {
            showToast(`正在播放: ${title}`);
            console.log(`[播放] ${title}`);
        }

        // 搜索
        function handleSearch(keyword) {
            if (!keyword.trim()) {
                showToast('请输入搜索内容');
                return;
            }
            showToast(`搜索: ${keyword}`);
            console.log(`[搜索] ${keyword}`);
        }

        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            console.log(`[切换] ${tab}`);
        }

        // 设置功能
        function openSettings() {
            document.getElementById('settingsPanel').style.display = 'block';
        }

        function closeSettings() {
            document.getElementById('settingsPanel').style.display = 'none';
        }

        function saveSettings() {
            const apiUrl = document.getElementById('apiUrl').value;
            const playerType = document.getElementById('playerType').value;
            const epgUrl = document.getElementById('epgUrl').value;

            localStorage.setItem('tvbox_api_url', apiUrl);
            localStorage.setItem('tvbox_player', playerType);
            localStorage.setItem('tvbox_epg', epgUrl);

            showToast('设置已保存');
            closeSettings();
        }

        function loadSettings() {
            document.getElementById('apiUrl').value = localStorage.getItem('tvbox_api_url') || '';
            document.getElementById('playerType').value = localStorage.getItem('tvbox_player') || '硬解';
            document.getElementById('epgUrl').value = localStorage.getItem('tvbox_epg') || 'https://epg.112114.xyz/';
        }

        // 显示提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // 获取设备信息
        function getDeviceInfo() {
            return JSON.stringify(DEVICE_CONFIG, null, 2);
        }
    </script>
</body>
</html>
